<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Warehouse Direct Pull Out</title>
    <link href="css/admin.css" rel="stylesheet">
    <style>
        .delivery-grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; padding: 20px; }
        .entry-card, .batch-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .batch-card { display: flex; flex-direction: column; height: 600px; }
        .table-container { flex-grow: 1; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 4px; }
        .delivery-table { width: 100%; border-collapse: collapse; }
        .delivery-table th { position: sticky; top: 0; background: #c0392b; color: white; padding: 12px; text-align: left; z-index: 10; }
        .delivery-table td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .upload-section { border-top: 2px solid #eee; padding-top: 15px; margin-top: 10px; }
        .btn-pullout { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-pullout:hover { background: #c0392b; }
        .status-badge { font-size: 0.8rem; padding: 4px 8px; border-radius: 12px; background: #eee; transition: 0.5s; }
        .barcode-tag { font-family: 'Courier New', monospace; font-weight: bold; color: #c0392b; background: #fce4d6; padding: 2px 6px; border-radius: 4px; border: 1px solid #f5b7b1; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #2c3e50; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .pullout-badge { background: #f9d5d5; color: #b71c1c; font-size: 0.75rem; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">ADMIN PANEL</div>
        <div class="sidebar-menu">
            <a href="admin.html" class="menu-link"><i>📊</i> Dashboard</a>
            
            
            <a href="index.html" class="menu-link" style="margin-top: auto; color: #ff5e57;"><i>🚪</i> Logout</a>
        </div>
    </div>

    <div class="main-container">
        <div class="top-nav">
            <div style="font-weight: 600; color: #e74c3c; display: flex; align-items: center; gap: 10px;">
                WAREHOUSE STOCK PULL-OUT OUTBOUND <span id="sync-status" class="status-badge">Ready</span>
            </div>
        </div>

        <div class="delivery-grid">
            <div class="entry-card">
                <h3 style="margin-top:0; color: #e74c3c;">Direct Stock Pull Out</h3>
                
                <div class="form-group">
                    <label>Reason for Pull Out</label>
                    <select id="dr_reason">
                        <option value="ADMIN_ADJUSTMENT">⚙️ Admin Stock Adjustment</option>
                        <option value="DAMAGED">❌ Damaged / Broken Item</option>
                        <option value="EXPIRED">📅 Expired Stock</option>
                        <option value="RETURN_TO_VENDOR">📦 Return to Supplier/Vendor</option>
                        <option value="INVENTORY_LOSS">🔍 Inventory Discrepancy / Loss</option>
                        
                    </select>
                </div>

                <div class="form-group">
                    <label>Scan Barcode / Serial</label>
                    <input type="text" id="dr_barcode" placeholder="Scan item barcode here..." autofocus onkeypress="handleBarcodeEntry(event)">
                </div>
            </div>

            <div class="batch-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin:0; color:#c0392b;">Pending Pull Out Queue</h3>
                    <button onclick="clearQueue()" style="background: none; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;">Clear List</button>
                </div>
                
                <div class="table-container">
                    <table class="delivery-table">
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th>Barcode</th>
                                <th>Price</th>
                                <th>Reason</th>
                                <th style="text-align: center;">Action</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="batch-body"></tbody>
                    </table>
                </div>

                <div class="upload-section">
                    <div style="display:flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600;">
                        <span>TOTAL UNIQUE ROWS TO DELETE: <span id="summary-qty" style="color:#e74c3c;">0</span></span>
                    </div>
                    <button class="btn-pullout" id="btn-submit" onclick="processDirectPullOut()">❌ CONFIRM DELETE UNIQUE ROW</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyAFoBQbe9NMq2IYVjqtCzQ3NJTsUEGDlb1uHQ1q483YNRInhI78aXPNWTLzn9oR6EmLQ/exec";

        let inventoryMaster = []; 
        let pulloutBatch = []; 

        window.onload = function() { refreshData(); };

        function refreshData() {
            const statusBadge = document.getElementById('sync-status');
            statusBadge.innerText = "Syncing...";
            fetch(WEB_APP_URL + "?action=getAdminData")
                .then(res => res.json())
                .then(data => {
                    inventoryMaster = data.inventory || data; 
                    statusBadge.innerText = "Online & Synced";
                    statusBadge.style.background = "#d4edda";
                })
                .catch(err => {
                    statusBadge.innerText = "Offline Mode";
                    statusBadge.style.background = "#f8d7da";
                });
        }

        function handleBarcodeEntry(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                const barcode = document.getElementById('dr_barcode').value.trim();
                const reason = document.getElementById('dr_reason').value;
                
                if (barcode) {
                    const isDuplicateInQueue = pulloutBatch.find(i => i.barcode === barcode);
                    const match = inventoryMaster.find(i => String(i.barcode).trim() === barcode);

                    if (isDuplicateInQueue) {
                        alert("Duplicate barcode sa listahan!");
                        document.getElementById('dr_barcode').value = "";
                        return;
                    }

                    if (!match) {
                        alert(`Error: Barcode [ ${barcode} ] wala sa database!`);
                    } else {
                        // Ginagamit ang "receive_from_warehouse" para pilitin ang script mo na mag-deleteRow()
                        pulloutBatch.unshift({ 
                            action: "receive_from_warehouse", 
                            name: match.name, 
                            barcode: barcode, 
                            price: match.price || 0,
                            qty: 1,
                            store: "PULLOUT_BLANK", // Iniwan nating blank para hindi magpadala sa mga branches mo (SMMG/SMNE)
                            reason: reason
                        });
                        renderTable();
                    }
                    document.getElementById('dr_barcode').value = ""; 
                    document.getElementById('dr_barcode').focus();
                }
            }
        }

        function renderTable() {
            const tbody = document.getElementById('batch-body');
            tbody.innerHTML = pulloutBatch.map((item, index) => `
                <tr>
                    <td>${item.name}</td>
                    <td><span class="barcode-tag">${item.barcode}</span></td>
                    <td>₱${Number(item.price).toLocaleString()}</td>
                    <td><span class="pullout-badge">${item.reason}</span></td>
                    <td style="text-align:center; font-weight:bold; color:#e74c3c;">DEDUCT</td>
                    <td style="text-align:right;">
                        <button onclick="removeLine(${index})" style="color:#ff7675; background:none; border:none; cursor:pointer; font-weight:bold;">✕</button>
                    </td>
                </tr>`).join('');
            document.getElementById('summary-qty').innerText = pulloutBatch.length;
        }

        function removeLine(i) { pulloutBatch.splice(i, 1); renderTable(); }
        function clearQueue() { pulloutBatch = []; renderTable(); }

        async function processDirectPullOut() {
            if (pulloutBatch.length === 0) return alert("Walang laman ang listahan!");
            if (!confirm(`Tiyakin:\nIto ay permanenteng MAGBUBURA ng ${pulloutBatch.length} unique row(s) sa iyong Inventory sheet. Magpatuloy?`)) return;
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.style.background = "#7f8c8d";
            btn.innerText = "DELETING ROW FROM GOOGLE SHEETS...";

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(pulloutBatch)
                });

                alert("SUCCESS: Ang mga natatanging hilera (unique rows) ay nabura na sa Inventory!");
                pulloutBatch = [];
                renderTable();
                setTimeout(refreshData, 2000);

            } catch (err) {
                alert("Connection Error.");
            } finally {
                btn.disabled = false;
                btn.style.background = "#e74c3c";
                btn.innerText = "❌ CONFIRM DELETE UNIQUE ROW";
            }
        }
    </script>
</body>
</html>
