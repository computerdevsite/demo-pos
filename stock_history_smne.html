<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMG Inventory - Filtered View</title>
    <style>
        :root {
            --gs-header-bg: #000000;
            --gs-header-text: #ffffff;
            --gs-border: #bcbcbc;
            --google-blue: #1a73e8;
        }

        body { font-family: 'Arial', sans-serif; margin: 0; background: #fff; display: flex; flex-direction: column; height: 100vh; }
        
        .top-navbar { padding: 10px 20px; border-bottom: 1px solid #dcdcdc; display: flex; justify-content: space-between; align-items: center; }
        
        .control-bar { padding: 10px 20px; background: #f8f9fa; border-bottom: 1px solid var(--gs-border); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .search-box, .date-selector { padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        .search-box { width: 250px; }
        
        .btn-refresh { background: var(--google-blue); color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .table-container { flex-grow: 1; overflow: auto; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        
        thead th { background: var(--gs-header-bg); color: var(--gs-header-text); padding: 12px; position: sticky; top: 0; z-index: 10; border: 1px solid #444; }
        
        tbody td { padding: 10px; border: 1px solid var(--gs-border); text-align: center; }
        
        .text-left { text-align: left; padding-left: 15px; }
        
        .remark-warehouse { color: #1a73e8; font-weight: bold; }
        .remark-approved { color: #0b8043; font-weight: bold; }
        
        label { font-size: 12px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <strong>SMNE - INVENTORY LOGS</strong>
        <div id="status" style="font-size: 12px; color: #0b8043;">● SYSTEM READY</div>
    </div>

    <div class="control-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="Search Barcode or Item..." oninput="filterData()">
        
        <div style="display: flex; align-items: center; gap: 5px;">
            <label>Filter Date:</label>
            <input type="date" id="dateFilter" class="date-selector" onchange="filterData()">
            <button class="btn-clear" onclick="clearFilters()">Clear</button>
        </div>

        <button class="btn-refresh" onclick="fetchInventory()">REFRESH DATA</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">BARCODE</th>
                    <th style="width: 30%;">ITEM NAME</th>
                    <th style="width: 10%;">PRICE</th>
                    <th style="width: 8%;">QTY</th>
                    <th style="width: 17%;">TIME STAMP</th>
                    <th style="width: 20%;">REMARK</th>
                </tr>
            </thead>
            <tbody id="inventory-body">
                <tr><td colspan="6">Loading accurate data...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKnZHePSbSMqf1G_lcnF867kEL6Idq6yNEBWiu2XtklhljQlCnloSshXHXNoHY6wUi/exec";
        let rawInventory = [];

        async function fetchInventory() {
            document.getElementById('status').innerText = "● SYNCING...";
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getAdminData`);
                const result = await response.json();
                rawInventory = result.inventory || [];
                renderTable(rawInventory);
                document.getElementById('status').innerText = "● LIVE: " + rawInventory.length + " ITEMS";
            } catch (e) {
                document.getElementById('status').innerText = "● CONNECTION ERROR";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = "";

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="padding:20px; color:red;">No records found for the selected filter.</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                const timeStr = item.timestamp || item.time_stamp || item.date || ""; 
                const remarkStr = item.remark || item.remarks || ""; 

                let remarkClass = "";
                if (remarkStr.includes("WAREHOUSE")) remarkClass = "remark-warehouse";
                if (remarkStr.includes("APPROVED")) remarkClass = "remark-approved";

                tr.innerHTML = `
                    <td>${item.barcode || ''}</td>
                    <td class="text-left">${item.name || ''}</td>
                    <td>₱${(item.price || 0).toLocaleString()}</td>
                    <td>1</td>
                    <td>${timeStr}</td>
                    <td class="${remarkClass}">${remarkStr}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterData() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            const dateVal = document.getElementById('dateFilter').value; // Format: YYYY-MM-DD

            const filtered = rawInventory.filter(item => {
                const timeStr = (item.timestamp || item.time_stamp || item.date || "").toString();
                
                // 1. Check Search Bar (Name or Barcode)
                const matchesSearch = (item.name && item.name.toLowerCase().includes(searchVal)) || 
                                     (item.barcode && item.barcode.toString().includes(searchVal));

                // 2. Check Date Selector
                let matchesDate = true;
                if (dateVal) {
                    // Kino-convert natin ang timestamp (M/D/YYYY) para magtugma sa HTML Date input (YYYY-MM-DD)
                    // Note: Ang Apps Script ay karaniwang nagbabalik ng "4/27/2026, 11:55:41 PM"
                    const rowDate = new Date(timeStr);
                    const filterDate = new Date(dateVal);
                    
                    matchesDate = rowDate.getFullYear() === filterDate.getFullYear() &&
                                  rowDate.getMonth() === filterDate.getMonth() &&
                                  rowDate.getDate() === filterDate.getDate();
                }

                return matchesSearch && matchesDate;
            });

            renderTable(filtered);
        }

        function clearFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('dateFilter').value = "";
            renderTable(rawInventory);
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
