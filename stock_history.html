<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMG Inventory - Accurate View</title>
    <style>
        :root {
            --gs-header-bg: #000000;
            --gs-header-text: #ffffff;
            --gs-border: #bcbcbc;
            --google-blue: #1a73e8;
        }

        body { font-family: 'Arial', sans-serif; margin: 0; background: #fff; display: flex; flex-direction: column; height: 100vh; }
        
        .top-navbar { padding: 10px 20px; border-bottom: 1px solid #dcdcdc; display: flex; justify-content: space-between; align-items: center; }
        
        .control-bar { padding: 10px 20px; background: #f8f9fa; border-bottom: 1px solid var(--gs-border); display: flex; gap: 10px; }
        
        .search-box { padding: 8px; border: 1px solid #ced4da; border-radius: 4px; width: 300px; }
        
        .btn-refresh { background: var(--google-blue); color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .table-container { flex-grow: 1; overflow: auto; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        
        thead th { background: var(--gs-header-bg); color: var(--gs-header-text); padding: 12px; position: sticky; top: 0; z-index: 10; border: 1px solid #444; }
        
        tbody td { padding: 10px; border: 1px solid var(--gs-border); text-align: center; }
        
        .text-left { text-align: left; padding-left: 15px; }
        
        /* Remark Colors */
        .remark-warehouse { color: #1a73e8; font-weight: bold; }
        .remark-approved { color: #0b8043; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <strong>SMMG - INVENTORY LOGS</strong>
        <div id="status" style="font-size: 12px; color: #0b8043;">● SYSTEM READY</div>
    </div>

    <div class="control-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="Search Barcode or Item..." oninput="filterData()">
        <button class="btn-refresh" onclick="fetchInventory()">REFRESH DATA</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">BARCODE</th>
                    <th style="width: 30%;">ITEM NAME</th>
                    <th style="width: 10%;">PRICE</th>
                    <th style="width: 8%;">QTY</th>
                    <th style="width: 17%;">TIME STAMP</th>
                    <th style="width: 20%;">REMARK</th>
                </tr>
            </thead>
            <tbody id="inventory-body">
                <tr><td colspan="6">Loading accurate data...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwkcQnmXYG_E3Z9rJGyZ9dlluJ9nPFs9GeWZt211ZyEbN0wxHf9MFjXRE6NLh0fh0t/exec";
        let rawInventory = [];

        async function fetchInventory() {
            document.getElementById('status').innerText = "● SYNCING...";
            try {
                // Pinapagana natin ang fetch sa URL mo
                const response = await fetch(`${WEB_APP_URL}?action=getAdminData`);
                const result = await response.json();
                
                // DAHIL SABLAY ANG 'inventory' object sa AppScript mo (kulang ng columns),
                // itong HTML na mismo ang mag-o-organize kung sakaling blangko ang properties.
                rawInventory = result.inventory || [];
                
                renderTable(rawInventory);
                document.getElementById('status').innerText = "● LIVE: " + rawInventory.length + " ITEMS";
            } catch (e) {
                document.getElementById('status').innerText = "● CONNECTION ERROR";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = "";

            data.forEach(item => {
                const tr = document.createElement('tr');
                
                // HTML FIX: Kung N/A ang lumalabas, ibig sabihin hindi 'timestamp' ang tawag ng AppScript.
                // Sinusubukan natin dito ang iba't ibang posibleng pangalan:
                const timeStr = item.timestamp || item.time_stamp || item.date || ""; 
                const remarkStr = item.remark || item.remarks || ""; 

                let remarkClass = "";
                if (remarkStr.includes("WAREHOUSE")) remarkClass = "remark-warehouse";
                if (remarkStr.includes("APPROVED")) remarkClass = "remark-approved";

                tr.innerHTML = `
                    <td>${item.barcode || ''}</td>
                    <td class="text-left">${item.name || ''}</td>
                    <td>₱${(item.price || 0).toLocaleString()}</td>
                    <td>1</td>
                    <td>${timeStr}</td>
                    <td class="${remarkClass}">${remarkStr}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterData() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = rawInventory.filter(i => 
                (i.name && i.name.toLowerCase().includes(val)) || 
                (i.barcode && i.barcode.toString().includes(val))
            );
            renderTable(filtered);
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
